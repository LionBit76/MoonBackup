# MoonBackup Configuration File
# Edit this file to configure your backup settings
# This file is located at: ~/printer_data/config/MoonBackup.cfg

# ============================================
# BACKUP SOURCES
# Set to 1 to include, 0 to exclude from backup
# ============================================

# Backup the entire home directory
BACKUP_HOME=1

# Include timelapse directory (~/timelapse) - can be very large
BACKUP_TIMELAPSE=0

# Include gcode files (~/printer_data/gcodes)
BACKUP_GCODES=1

# Include printer configuration (~/printer_data/config)
BACKUP_PRINTER_DATA=1

# Include printer logs (~/printer_data/logs)
BACKUP_LOGS=1

# Include printer database (~/printer_data/database)
BACKUP_DATABASE=1

# Include Klipper configuration (~/klipper)
BACKUP_KLIPPER=1

# Custom directories to include (space separated, relative to ~/)
# Example: CUSTOM_INCLUDE="my_files custom_configs"
CUSTOM_INCLUDE=""

# Custom directories to exclude (space separated, relative to ~/)
# Example: CUSTOM_EXCLUDE="temp cache"
CUSTOM_EXCLUDE="Backup MoonBackup"

# ============================================
# BACKUP TYPE
# ============================================
# full: Complete backup every time
# incremental: Only backup changed files since last full backup
BACKUP_TYPE="full"

# For incremental backups: number of full backups to keep
# When this number is reached, the oldest full backup is deleted
INCREMENTAL_FULL_KEEP=3

# ============================================
# BACKUP DESTINATIONS
# Set to 1 to enable, 0 to disable
# ============================================

# Local backup to ~/Backup
DEST_LOCAL=1

# Backup to GitHub
DEST_GITHUB=0

# Backup via SCP to remote server
DEST_SCP=0

# ============================================
# LOCAL BACKUP SETTINGS
# ============================================
# Directory where local backups are stored
LOCAL_BACKUP_DIR="$HOME/Backup"

# Maximum number of local backups to keep (0 = unlimited)
LOCAL_MAX_BACKUPS=5

# Compression level (0 = no compression, 1 = fast, 9 = best)
LOCAL_COMPRESSION=6

# ============================================
# GITHUB BACKUP SETTINGS
# ============================================
# GitHub Personal Access Token (classic format)
# Generate at: https://github.com/settings/tokens
# Required scopes: repo
GITHUB_TOKEN=""

# GitHub Repository in format: username/repo-name
# Example: myusername/MoonBackup-Backups
GITHUB_REPO=""

# GitHub branch to push backups to
GITHUB_BRANCH="main"

# Commit message template (use %DATE% for current date)
GITHUB_COMMIT_MSG="MoonBackup - %DATE%"

# ============================================
# SCP BACKUP SETTINGS
# ============================================
# Remote server hostname or IP
SCP_HOST=""

# Remote server username
SCP_USER=""

# Remote server directory path
SCP_PATH="/backups/voron"

# SSH port (default: 22)
SCP_PORT=22

# Private key file path (leave empty to use password auth)
# Example: $HOME/.ssh/id_rsa
SCP_KEY=""

# ============================================
# EMAIL NOTIFICATION SETTINGS
# ============================================
# Enable email notifications (1 = yes, 0 = no)
EMAIL_ENABLED=0

# Email recipient
EMAIL_TO="your-email@example.com"

# Email sender
EMAIL_FROM="moonbackup@voron.local"

# SMTP server hostname
EMAIL_SMTP="smtp.example.com"

# SMTP port
EMAIL_PORT=587

# SMTP username (if required)
EMAIL_USER=""

# SMTP password (if required)
EMAIL_PASSWORD=""

# Use TLS for SMTP connection (1 = yes, 0 = no)
EMAIL_USE_TLS=1

# Use STARTTLS for SMTP connection (1 = yes, 0 = no)
EMAIL_USE_STARTTLS=1

# ============================================
# BACKUP TIMING & NAMES
# ============================================
# Backup name prefix
BACKUP_PREFIX="voron-backup"

# Include date in backup name (1 = yes, 0 = no)
BACKUP_INCLUDE_DATE=1

# Date format for backup name
# Use strftime format: %Y=year, %m=month, %d=day, %H=hour, %M=minute, %S=second
BACKUP_DATE_FORMAT="%Y%m%d-%H%M%S"

# ============================================
# LOGGING SETTINGS
# ============================================
# Log file location
LOG_FILE="$HOME/printer_data/logs/moonbackup.log"

# Log level: DEBUG, INFO, WARN, ERROR
LOG_LEVEL="INFO"

# Maximum log file size in KB before rotation
LOG_MAX_SIZE=1024

# Number of rotated log files to keep
LOG_KEEP=5
